server.port=${PORT:8080}

spring.application.name=hrms-backend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.data-source-properties.sslMode=REQUIRED

spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:U3luUUhSTVMyMDI2U3VwZXJTZWNyZXRLZXlGb3JBY2Nlc3NBbmRSZWZyZXNoVG9rZW5TaWduaW5n}
app.jwt.access-token-expiration-minutes=${JWT_ACCESS_EXPIRATION_MINUTES:15}
app.jwt.refresh-token-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}
app.auth.password-reset-otp-expiration-minutes=${PASSWORD_RESET_OTP_EXPIRATION_MINUTES:10}
app.auth.expose-reset-otp=${EXPOSE_RESET_OTP:false}

logging.level.org.springframework.security=INFO

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.storage.employee-documents-dir=${EMPLOYEE_DOCUMENTS_DIR:${user.home}/.hrms/uploads/employee-documents}
app.storage.employee-document-max-size-bytes=${EMPLOYEE_DOCUMENT_MAX_SIZE_BYTES:10485760}
app.storage.task-attachments-dir=${TASK_ATTACHMENTS_DIR:${user.home}/.hrms/uploads/task-attachments}
app.storage.task-attachment-max-size-bytes=${TASK_ATTACHMENT_MAX_SIZE_BYTES:10485760}
